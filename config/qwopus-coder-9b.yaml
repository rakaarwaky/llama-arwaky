# ═══════════════════════════════════════════════════════════
# Config: Qwopus3.5-9B-Coder-MTP (Jackwrong)
# Model : GGUF/Jackwrong/Qwopus3.5-9B-Coder-MTP-Q6_K/
#         Qwopus3.5-9B-Coder-MTP-Q6_K.gguf
# ═══════════════════════════════════════════════════════════
# Code-focused model — Q6_K for high precision
# Multimodal: NO
# Tip: Lower temp for deterministic code generation
# ═══════════════════════════════════════════════════════════
# Only OVERRIDES from default.yaml are listed here
# ═══════════════════════════════════════════════════════════

model:
  ctx: 16384                      # Coders need long context for large files

sampling:
  temp: 0.3                       # Low temp — deterministic for code
  top_k: 20
  top_p: 0.90

kv_cache:
  no_kv_offload: false            # Keep KV on GPU for code quality
  cache_type_k: "q8_0"            # Higher precision KV cache for code
  cache_type_v: "q8_0"

multimodal:
  mmproj: none                    # No vision for this model

reasoning:
  reasoning_budget: 0

ui:
  max_name_len: 60